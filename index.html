<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown to my world's Birthday..</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Quicksand:wght@400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0011 0%, #2d0a1e 25%, #4a1942 50%, #1a0a2e 75%, #0d0015 100%);
      background-attachment: fixed;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow-x: hidden; position: relative;
      font-family: 'Quicksand', sans-serif;
    }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; width: 2px; height: 2px; background: white;
      border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite; opacity: 0;
    }
    @keyframes twinkle { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.9; } }
    .hearts-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .heart {
      position: absolute; bottom: -60px; font-size: var(--size);
      animation: floatUp var(--dur) ease-in infinite; animation-delay: var(--delay); opacity: 0;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      10% { opacity: 0.7; } 50% { opacity: 0.5; } 90% { opacity: 0.2; }
      100% { transform: translateY(-110vh) rotate(360deg) scale(0.5); opacity: 0; }
    }
    .balloons-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .balloon {
      position: absolute; bottom: -150px; width: var(--bw); height: calc(var(--bw) * 1.2);
      background: var(--color); border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      animation: balloonFloat var(--dur) ease-in infinite; animation-delay: var(--delay);
      opacity: 0; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }
    .balloon::before {
      content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
      width: 10px; height: 10px; background: var(--color);
      clip-path: polygon(50% 100%, 0 0, 100% 0); filter: brightness(0.85);
    }
    .balloon::after {
      content: ''; position: absolute; bottom: -80px; left: 50%; width: 1px; height: 80px;
      background: rgba(255,255,255,0.25); transform: translateX(-50%);
    }
    @keyframes balloonFloat {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
      8% { opacity: 0.85; }
      50% { transform: translateY(-55vh) translateX(30px) rotate(-5deg); opacity: 0.75; }
      100% { transform: translateY(-120vh) translateX(-20px) rotate(5deg); opacity: 0; }
    }
    .glow-orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15;
      z-index: 0; animation: orbPulse 6s ease-in-out infinite;
    }
    @keyframes orbPulse { 0%, 100% { transform: scale(1); opacity: 0.12; } 50% { transform: scale(1.2); opacity: 0.2; } }
    .content { text-align: center; z-index: 10; position: relative; padding: 0 20px; margin-top: -5vh; }
    .content h1 {
      font-family: 'Dancing Script', cursive; font-size: clamp(2.2em, 6vw, 4em); color: #ffd6e8;
      text-shadow: 0 0 30px rgba(255,105,180,0.4), 0 0 60px rgba(255,105,180,0.2);
      margin-bottom: 8px; animation: fadeInDown 1.5s ease-out;
    }
    .content .tagline {
      font-family: 'Dancing Script', cursive; font-size: clamp(1em, 3vw, 1.6em);
      color: rgba(255,182,213,0.7); margin-bottom: 40px; animation: fadeInDown 1.5s ease-out 0.3s both;
    }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    .countdown {
      display: flex; justify-content: center; gap: clamp(12px, 4vw, 30px);
      margin-bottom: 40px; animation: fadeInDown 1.5s ease-out 0.6s both;
    }
    .countdown-item { display: flex; flex-direction: column; align-items: center; }
    .countdown-item .number {
      font-size: clamp(2.5em, 8vw, 5em); font-weight: 700; color: white;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,105,180,0.25);
      border-radius: 16px; padding: 10px clamp(14px, 4vw, 28px); min-width: clamp(70px, 15vw, 110px);
      text-shadow: 0 0 20px rgba(255,105,180,0.5); backdrop-filter: blur(10px); transition: transform 0.3s;
    }
    .countdown-item .number:hover { transform: scale(1.05); }
    .countdown-item .label {
      font-size: clamp(0.65em, 2vw, 0.9em); color: rgba(255,182,213,0.7);
      margin-top: 8px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
    }
    .separator {
      font-size: clamp(2em, 6vw, 4em); color: rgba(255,105,180,0.5);
      align-self: flex-start; padding-top: 14px; animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .message {
      font-family: 'Dancing Script', cursive; font-size: clamp(1em, 3vw, 1.5em);
      color: rgba(255,182,213,0.6); animation: fadeInDown 1.5s ease-out 0.9s both;
    }
    .message .heart-icon { color: #ff6b9d; display: inline-block; animation: heartbeat 1.2s ease-in-out infinite; }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); } 15% { transform: scale(1.25); }
      30% { transform: scale(1); } 45% { transform: scale(1.2); } 60% { transform: scale(1); }
    }
    .revealed { display: none; }
    .revealed.show { display: block; animation: revealPop 1s ease-out; }
    @keyframes revealPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .play-btn {
      display: inline-block; margin-top: 30px; padding: 16px 48px;
      background: linear-gradient(135deg, #ff6b9d, #c44dff); color: white;
      text-decoration: none; border-radius: 50px; font-size: 1.3em; font-weight: 700;
      font-family: 'Quicksand', sans-serif; border: none; cursor: pointer;
      box-shadow: 0 8px 30px rgba(255,107,157,0.4); transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeInDown 1s ease-out 0.3s both;
    }
    .play-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(255,107,157,0.6); }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .content { padding: 12px; }
      .content h1 { margin-bottom: 4px; }
      .content .tagline { margin-bottom: 24px; }
      .countdown { gap: 6px; margin-bottom: 24px; }
      .countdown-item .number {
        padding: 8px 10px;
        min-width: 58px;
        border-radius: 12px;
      }
      .countdown-item .label { font-size: 0.55em; letter-spacing: 1px; margin-top: 5px; }
      .separator { font-size: 1.8em; padding-top: 10px; }
      .message { font-size: 0.95em; }
      .glow-orb { filter: blur(50px); opacity: 0.1; }
      .play-btn { padding: 14px 36px; font-size: 1.1em; }
    }

    @media (max-width: 360px) {
      .countdown-item .number {
        font-size: 2em;
        padding: 6px 8px;
        min-width: 48px;
      }
      .separator { font-size: 1.5em; }
    }

    /* Prevent horizontal scroll on any device */
    html, body { max-width: 100vw; overflow-x: hidden; }

    /* Photo Slider */
    .slider-section {
      width: 100%;
      max-width: 500px;
      margin: 30px auto 40px;
      z-index: 10;
      position: relative;
    }

    .slider-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.2em, 3.5vw, 1.8em);
      color: #ffd6e8;
      text-align: center;
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(255,105,180,0.3);
    }

    .slider-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 30px rgba(255,105,180,0.15);
      border: 2px solid rgba(255,105,180,0.2);
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }

    .slide.active {
      opacity: 1;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }

    .slider-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,182,213,0.3);
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      padding: 0;
    }

    .slider-dot.active {
      background: #ff6b9d;
      transform: scale(1.3);
      box-shadow: 0 0 8px rgba(255,107,157,0.5);
    }

    .slider-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.3);
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2em;
      cursor: pointer;
      z-index: 5;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-nav:hover { background: rgba(255,105,180,0.5); }
    .slider-prev { left: 10px; }
    .slider-next { right: 10px; }

    @media (max-width: 480px) {
      .slider-section { max-width: 90vw; margin: 20px auto 30px; }
      .slider-nav { width: 30px; height: 30px; font-size: 1em; }
    }

    /* Popper button */
    .popper-btn {
      display: inline-block;
      padding: 16px 48px;
      background: linear-gradient(135deg, #ff6b9d, #c44dff);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.3em;
      font-weight: 700;
      font-family: 'Quicksand', sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(255,107,157,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeInDown 1s ease-out 0.3s both;
      z-index: 10;
      position: relative;
    }

    .popper-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 40px rgba(255,107,157,0.6);
    }

    /* Confetti - pre-built elements, no DOM creation on click */
    .confetti-layer {
      position: fixed;
      inset: 0;
      z-index: 140;
      pointer-events: none;
      overflow: hidden;
      display: none;
    }

    .confetti-layer.active { display: block; }

    .confetti-layer span {
      position: absolute;
      top: -20px;
      font-size: 20px;
      animation: confettiRain var(--d) linear forwards;
      animation-delay: var(--dl);
      left: var(--l);
      will-change: transform;
    }

    @keyframes confettiRain {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    /* Birthday card overlay */
    #birthdayCard {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #birthdayCard.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    .card {
      background: linear-gradient(145deg, #fffdf5, #fdf6e3);
      border-radius: 24px;
      padding: clamp(36px,7vw,60px) clamp(30px,6vw,56px);
      max-width: 520px;
      width: 92vw;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(255,215,0,0.15);
      transform: scale(1);
      position: relative;
      overflow: hidden;
      animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardPop {
      from { transform: scale(0.7) rotate(-3deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .card::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
      border-radius: 26px;
      z-index: -1;
    }

    .card-emoji {
      font-size: clamp(3em, 10vw, 5em);
      margin-bottom: 12px;
    }

    .card h2 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2em, 6vw, 3.2em);
      color: #b8860b;
      margin-bottom: 16px;
    }

    .card p {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.1em, 3.5vw, 1.6em);
      color: #5d4037;
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .card .card-hearts {
      margin-top: 18px;
      font-size: 1.8em;
      animation: heartbeat 1.2s ease-in-out infinite;
    }

    .card-close {
      margin-top: 24px;
      padding: 12px 36px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1.1em;
      font-weight: 700;
      font-family: 'Quicksand', sans-serif;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 4px 15px rgba(255,140,0,0.3);
    }

    .card-close:hover { transform: scale(1.05); }

  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="glow-orb" style="width:min(400px,80vw);height:min(400px,80vw);background:#ff69b4;top:-100px;left:-100px;"></div>
  <div class="glow-orb" style="width:min(350px,70vw);height:min(350px,70vw);background:#c44dff;bottom:-80px;right:-80px;animation-delay:3s;"></div>
  <div class="glow-orb" style="width:min(250px,50vw);height:min(250px,50vw);background:#ff1493;top:50%;left:60%;animation-delay:1.5s;"></div>
  <div class="hearts-container" id="hearts"></div>
  <div class="balloons-container" id="balloons"></div>
  <div class="content">
    <div id="countdownSection">
      <div style="display:flex;justify-content:center;align-items:center;gap:clamp(8px,3vw,20px);margin-bottom:10px;">
        <img src="assets/gifs/bubu-kiss-dudu-i-kiss-you.gif" alt="Bubu & Dudu Kiss" style="width:clamp(120px,28vw,220px);display:block;border-radius:12px;">
        <img src="assets/gifs/bubu-dudu-sseeyall.gif" alt="Bubu & Dudu" style="width:clamp(120px,28vw,220px);display:block;border-radius:12px;">
      </div>
      <h1>Countdown to my world's Birthday..</h1>
      <p class="tagline">Just a little more patience...</p>
      <div class="countdown">
        <div class="countdown-item"><span class="number" id="days">00</span><span class="label">Days</span></div>
        <span class="separator">:</span>
        <div class="countdown-item"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
        <span class="separator">:</span>
        <div class="countdown-item"><span class="number" id="minutes">00</span><span class="label">Minutes</span></div>
        <span class="separator">:</span>
        <div class="countdown-item"><span class="number" id="seconds">00</span><span class="label">Seconds</span></div>
      </div>
      <p class="message"><span class="heart-icon">&#10084;</span> The wait will be worth it <span class="heart-icon">&#10084;</span></p>
    </div>
    <div id="revealedSection" class="revealed">
      <h1>Surprise! &#127881;</h1>
      <p class="tagline">Made with love, just for you</p>
      <a href="kenken.html" class="play-btn">&#10084; Open Your Gift &#10084;</a>
    </div>
  </div>

  <!-- Photo Slider -->
  <div class="slider-section">
    <p class="slider-title">Our Moments &#10084;</p>
    <div class="slider-container" id="slider">
      <div class="slide active"><img src="assets/moments/a1.jpg" alt="Photo 1"></div>
      <div class="slide"><img src="assets/moments/a2.jpg" alt="Photo 2"></div>
      <div class="slide"><img src="assets/moments/a3.jpg" alt="Photo 3"></div>
      <div class="slide"><img src="assets/moments/a4.jpg" alt="Photo 4"></div>
      <div class="slide"><img src="assets/moments/a5.jpg" alt="Photo 5"></div>
      <button class="slider-nav slider-prev" onclick="changeSlide(-1)">&#10094;</button>
      <button class="slider-nav slider-next" onclick="changeSlide(1)">&#10095;</button>
    </div>
    <div class="slider-dots" id="sliderDots"></div>
  </div>

  <div style="text-align:center;margin:30px auto 50px;z-index:10;position:relative;">
  </div>

<script>
  // April 12 midnight IST = April 11 18:30 UTC
  const TARGET = new Date('2026-04-11T18:30:00Z');
  function updateCountdown() {
    const now = new Date();
    const diff = TARGET - now;
    if (diff <= 0) {
      // Redirect to surprise page automatically
      window.location.href = 'surprise.html?auto=1';
      return;
    }
    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);
    const s = Math.floor((diff / 1000) % 60);
    document.getElementById('days').textContent = String(d).padStart(2, '0');
    document.getElementById('hours').textContent = String(h).padStart(2, '0');
    document.getElementById('minutes').textContent = String(m).padStart(2, '0');
    document.getElementById('seconds').textContent = String(s).padStart(2, '0');
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random()*100 + '%';
    star.style.top = Math.random()*100 + '%';
    star.style.setProperty('--dur', (2+Math.random()*4)+'s');
    star.style.animationDelay = Math.random()*4 + 's';
    star.style.width = star.style.height = (1+Math.random()*2)+'px';
    starsEl.appendChild(star);
  }

  const heartsEl = document.getElementById('hearts');
  const heartChars = ['\u2764','\uD83D\uDC95','\uD83D\uDC97','\uD83D\uDC96','\u2665','\uD83D\uDC98','\u2728'];
  function spawnHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];
    heart.style.left = Math.random()*100 + '%';
    heart.style.setProperty('--size', (16+Math.random()*24)+'px');
    heart.style.setProperty('--dur', (8+Math.random()*12)+'s');
    heart.style.setProperty('--delay', '0s');
    heartsEl.appendChild(heart);
    setTimeout(() => heart.remove(), 20000);
  }
  for (let i = 0; i < 15; i++) setTimeout(spawnHeart, Math.random()*5000);
  setInterval(spawnHeart, 1500);

  const balloonsEl = document.getElementById('balloons');
  const balloonColors = [
    'rgba(255,105,180,0.75)','rgba(255,20,147,0.7)','rgba(196,77,255,0.7)',
    'rgba(255,182,213,0.8)','rgba(220,60,120,0.7)','rgba(180,50,200,0.65)','rgba(255,140,180,0.75)'
  ];
  function spawnBalloon(preplace) {
    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    balloon.style.left = (5+Math.random()*90) + '%';
    balloon.style.setProperty('--bw', (Math.min(35+Math.random()*30, window.innerWidth*0.12))+'px');
    balloon.style.setProperty('--color', balloonColors[Math.floor(Math.random()*balloonColors.length)]);
    const dur = 10+Math.random()*10;
    balloon.style.setProperty('--dur', dur+'s');
    balloon.style.setProperty('--delay', '0s');
    // Pre-place initial balloons partway through their animation
    if (preplace) {
      const offset = 0.25 + Math.random() * 0.5; // 25%-75% through animation
      balloon.style.animationDelay = '-' + (dur * offset) + 's';
    }
    balloonsEl.appendChild(balloon);
    setTimeout(() => balloon.remove(), 22000);
  }
  // Initial batch already visible on screen
  for (let i = 0; i < 10; i++) spawnBalloon(true);
  // Regular spawning from below
  setInterval(() => spawnBalloon(false), 2500);

  // =================== PHOTO SLIDER ===================
  const slides = document.querySelectorAll('.slide');
  const dotsContainer = document.getElementById('sliderDots');
  let currentSlide = 0;
  let slideInterval;

  // Create dots
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'slider-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goToSlide(i));
    dotsContainer.appendChild(dot);
  });

  function goToSlide(n) {
    slides[currentSlide].classList.remove('active');
    dotsContainer.children[currentSlide].classList.remove('active');
    currentSlide = (n + slides.length) % slides.length;
    slides[currentSlide].classList.add('active');
    dotsContainer.children[currentSlide].classList.add('active');
    resetAutoSlide();
  }

  function changeSlide(dir) {
    goToSlide(currentSlide + dir);
  }

  function resetAutoSlide() {
    clearInterval(slideInterval);
    slideInterval = setInterval(() => goToSlide(currentSlide + 1), 4000);
  }

  resetAutoSlide();
</script>
</body>
</html
